# This rule is not used by the project docurator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the docs.opentelekomcloud.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: docurator
    app.kubernetes.io/managed-by: kustomize
  name: space-editor-role
rules:
- apiGroups:
  - docs.opentelekomcloud.com
  resources:
  - spaces
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - docs.opentelekomcloud.com
  resources:
  - spaces/status
  verbs:
  - get
